name: QUANTAURA CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate package import
        run: python -c "import quantaura; print('QUANTAURA-Core import successful')"

      - name: Run tests
        run: |
          if [ -d tests ]; then pytest -v; else echo 'No tests directory yet'; fi
